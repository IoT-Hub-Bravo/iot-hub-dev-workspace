# IoT Hub API Gateway — Nginx reverse proxy
# Proxies requests to upstream microservices by path prefix.
# All services must be on the iot-hub-nw Docker network.

upstream auth_service {
    server auth-service:8001;
}

upstream device_registry {
    server device-registry:8000;
}

server {
    listen 80;
    server_name _;

    # ── auth-service ─────────────────────────────────────────────────────────
    # Covers:
    #   POST /api/auth/login/
    #   GET  /api/auth/.well-known/jwks.json
    #   GET  /api/health/  (auth-service healthcheck)
    location /api/auth/ {
        proxy_pass         http://auth_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── device-registry-service (and all other /api/ routes) ─────────────────
    # Covers: /api/devices/, /api/metrics/, /api/devices/<pk>/metrics/
    # Note: /api/auth/ above takes priority (longer prefix match).
    location /api/ {
        proxy_pass         http://device_registry;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── gateway self-check ───────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
