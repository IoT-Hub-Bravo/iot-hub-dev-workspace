name: ${COMPOSE_SHARED_NAME:-iot-hub-shared}

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../docker/postgres/generated:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iot-hub-nw

  redis:
    image: redis:7.0-alpine3.19
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iot-hub-nw

  flower:
    image: mher/flower:2.0
    container_name: flower
    ports:
      - "5555:5555"
    volumes:
      - flower_data:/data
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_FLOWER_USER: ${CELERY_FLOWER_USER}
      CELERY_FLOWER_PASSWORD: ${CELERY_FLOWER_PASSWORD}
    command:
      - "celery"
      - "--broker=${CELERY_BROKER_URL}"
      - "flower"
      - "--port=5555"
      - "--basic_auth=${CELERY_FLOWER_USER}:${CELERY_FLOWER_PASSWORD}"
      - "--persistent=true"
      - "--db=/data/flower.db"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - iot-hub-nw

volumes:
  db_data:
  redis_data:
  flower_data:

networks:
  iot-hub-nw:
    external: true
